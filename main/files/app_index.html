<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 App</title>
  <link rel="stylesheet" href="/framework/ui/styles.css">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">

  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <nav class="emb-nav">
      <span class="emb-nav-title">My ESP32 App</span>
      <div class="emb-nav-actions">
        <div class="emb-nav-menu">
          <button id="emb-nav-btn" class="emb-nav-btn"
                  aria-haspopup="true" aria-expanded="false">
            Settings
          </button>
          <ul id="emb-nav-dropdown" class="emb-nav-dropdown hidden" role="menu">
            <li><a href="/framework/ui/index.html#wifi"     class="emb-nav-item" role="menuitem">Wi-Fi</a></li>
            <li><a href="/framework/ui/index.html#firmware" class="emb-nav-item" role="menuitem">Firmware</a></li>
            <li><a href="/framework/ui/index.html#device"   class="emb-nav-item" role="menuitem">Device</a></li>
            <li><a href="/framework/ui/index.html#security" class="emb-nav-item" role="menuitem">Security</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <h1 class="text-2xl font-semibold mt-4 mb-2">Hello from the app!</h1>
    <p class="text-gray-700 mb-6">
      This page is served from <code>main/files/app_index.html</code> and embedded
      directly into the firmware binary.  Replace it with your own UI.
    </p>

    <div id="status" class="text-sm text-gray-500">Loading device info…</div>

  </div>

  <script>
    // Example: fetch the device info from the framework API
    fetch("/framework/api/device/info")
      .then(r => r.json())
      .then(d => {
        document.getElementById("status").textContent =
          `Device: ${d.hostname || "(unknown)"} | IP: ${d.ip || "(unknown)"}`;
      })
      .catch(() => {
        document.getElementById("status").textContent = "Could not reach device API.";
      });

    // Settings dropdown
    const navBtn      = document.getElementById("emb-nav-btn");
    const navDropdown = document.getElementById("emb-nav-dropdown");
    if (navBtn && navDropdown) {
      navBtn.addEventListener("click", e => {
        e.stopPropagation();
        const open = !navDropdown.classList.contains("hidden");
        navDropdown.classList.toggle("hidden", open);
        navBtn.setAttribute("aria-expanded", String(!open));
      });
      document.addEventListener("click", () => {
        navDropdown.classList.add("hidden");
        navBtn.setAttribute("aria-expanded", "false");
      });
    }
  </script>

</body>
</html>
