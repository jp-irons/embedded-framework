<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Management</title>
  <script type="module" src="./app.js" defer></script>
  <link rel="stylesheet" href="/app/ui/styles.css">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen relative">

  <!-- App Shell -->
  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <!-- Navigation (rendered once, always visible) -->
    <nav class="emb-nav">
      <span class="emb-nav-title">Device Management</span>
      <div class="emb-nav-actions">
        <a href="/" class="emb-nav-link">Home</a>
        <div class="emb-nav-menu">
          <button id="emb-nav-btn" class="emb-nav-btn"
                  aria-haspopup="true" aria-expanded="false">
            Settings
          </button>
          <ul id="emb-nav-dropdown" class="emb-nav-dropdown hidden" role="menu">
            <li><a href="#wifi"     class="emb-nav-item" role="menuitem">Wi-Fi</a></li>
            <li><a href="#firmware" class="emb-nav-item" role="menuitem">Firmware</a></li>
            <li><a href="#device"   class="emb-nav-item" role="menuitem">Device</a></li>
            <li><a href="#security" class="emb-nav-item" role="menuitem">Security</a></li>
            <li class="emb-nav-divider"></li>
            <!-- Dev placeholder — reload the framework UI; remove before production -->
            <li><a href="./index.html" class="emb-nav-item" role="menuitem">About</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- View container — router swaps content here -->
    <div id="app"></div>

  </div>

  <!-- Login Overlay — shown when credentials are required or rejected -->
  <div id="login-overlay" class="login-overlay hidden">
    <div class="login-card">
      <h2 class="text-lg font-semibold mb-4">Device Login</h2>
      <p class="text-sm text-gray-600 mb-4">
        Enter the <strong>current</strong> API password to continue.
        The factory default is <code>esp32admin</code>.
      </p>
      <!-- action="." is required: browsers only offer to save credentials when
           the form has an action attribute, even when submit is preventDefault()d. -->
      <form id="login-form" action=".">
        <!-- Username anchor for credential managers.  Must be reachable by the
             browser's form scanner — display:none hides it from some scanners,
             so we use a visually-invisible-but-present element instead.
             The device always uses "admin" as its username. -->
        <input type="text" name="username" autocomplete="username"
               value="admin" tabindex="-1" aria-hidden="true"
               style="position:absolute;width:1px;height:1px;padding:0;
                      border:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);
                      white-space:nowrap;" />
        <input id="login-password" type="password" name="password"
               class="input-field mb-3"
               placeholder="Password"
               autocomplete="current-password" />
        <p id="login-error" class="text-sm hidden mb-3" style="color:#dc2626">
          Incorrect password — please try again.
        </p>
        <button type="submit"
                class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700"
                style="width:100%">
          Login
        </button>
      </form>
    </div>
  </div>

  <!-- Message Modal (once, shared across all views) -->
  <div id="message-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="message-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p  id="message-modal-message" class="text-sm text-gray-700 mb-6"></p>
      <div class="flex justify-end mt-4">
        <button id="message-ok-btn" class="px-3 py-1 bg-gray-300 rounded hover:bg-gray-400">OK</button>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal (once, shared across all views) -->
  <div id="confirm-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="confirm-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p  id="confirm-modal-message" class="text-sm text-gray-700 mb-6"></p>
      <div class="flex justify-end gap-3">
        <button id="confirm-cancel-btn" class="px-3 py-1 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
        <button id="confirm-ok-btn"     class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">OK</button>
      </div>
    </div>
  </div>

</body>
</html>
