<!DOCTYPE html>
<html lang="en">
	<head>
	  <meta charset="UTF-8" />
	  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	  <title>ESP32 WiFi Provisioning</title>

	  <script type="module" src="/embedded/app.js" defer></script>
	  <link rel="stylesheet" href="/common/styles.css">

	</head>
	
<body class="bg-gray-100 text-gray-900 min-h-screen relative">

  <!-- Device Management Card -->
  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <h1 class="text-2xl font-semibold mb-4">Device Management</h1>

	<!-- Shared Header -->
	<div id="navigation"></div>

    <div class="mt-8">
      <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-gray-300">
        <button id="btn-clear-nvs" class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">
          Clear NVS
        </button>

        <button id="btn-reboot" class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">
          Reboot
        </button>
      </div>
    </div>

  </div> <!-- END device management card -->


  <!-- Message Modal -->
  <div id="message-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="message-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p id="message-modal-message" class="text-sm text-gray-700 mb-6"></p>
	  <div class="flex justify-end mt-4">
	    <button id="message-ok-btn"
	            class="px-3 py-1 bg-gray-300 rounded hover:bg-gray-400">
	      OK
	    </button>
	  </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirm-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="confirm-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p id="confirm-modal-message" class="text-sm text-gray-700 mb-6"></p>

      <div class="flex justify-end gap-3">
        <button id="confirm-cancel-btn"
                class="px-3 py-1 bg-gray-300 rounded hover:bg-gray-400">
          Cancel
        </button>

        <button id="confirm-ok-btn"
                class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">
          OK
        </button>
      </div>
    </div>
  </div>
  
  <script>
    fetch('/embedded/navigation.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('navigation').innerHTML = html;
      });
  </script>
</body>
</html>
