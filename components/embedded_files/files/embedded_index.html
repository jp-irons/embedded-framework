<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Management</title>
  <script type="module" src="/embedded/app.js" defer></script>
  <link rel="stylesheet" href="/embedded/styles.css">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen relative">

  <!-- App Shell -->
  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <!-- Navigation (rendered once, always visible) -->
    <nav class="flex gap-3 mb-6">
      <a href="/"           class="nav-link px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Home</a>
	  <a href="/embedded/index.html"           class="nav-link px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Embedded</a>
      <a href="#wifi"           class="nav-link px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">WiFi</a>
      <a href="#firmware"       class="nav-link px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Firmware</a>
      <a href="#device"         class="nav-link px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Device</a>
    </nav>

    <!-- View container — router swaps content here -->
    <div id="app"></div>

  </div>

  <!-- Message Modal (once, shared across all views) -->
  <div id="message-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="message-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p  id="message-modal-message" class="text-sm text-gray-700 mb-6"></p>
      <div class="flex justify-end mt-4">
        <button id="message-ok-btn" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">OK</button>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal (once, shared across all views) -->
  <div id="confirm-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="confirm-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p  id="confirm-modal-message" class="text-sm text-gray-700 mb-6"></p>
      <div class="flex justify-end gap-3">
        <button id="confirm-cancel-btn" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
        <button id="confirm-ok-btn"     class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">OK</button>
      </div>
    </div>
  </div>

</body>
</html>
