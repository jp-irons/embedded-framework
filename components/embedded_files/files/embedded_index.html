<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Management</title>

  <link rel="stylesheet" href="/embedded/styles.css">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen relative">

  <!-- Recovery Card -->
  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <h1 class="text-2xl font-semibold mb-4">Device Management</h1>

	<!-- Shared Header -->
	<div id="navigation"></div>

	<p class="text-gray-700 mb-6">
      This interface supports configuration of device features,
	  including WiFi, Firmware, and Reboot.
    </p>

    <!-- Horizontal Menu Bar -->
    <div class="flex gap-6 mb-6 border-b border-gray-300 pb-3">

      <!-- WiFi Menu -->
      <div class="relative menu-group">
        <button class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">
          WiFi
        </button>

        <div class="absolute left-0 mt-0 hidden group-hover:block bg-white border border-gray-300 rounded shadow w-48 z-10">
          <a href="/embedded/wifi.html" class="block px-4 py-2 hover:bg-gray-100">
            Configure WiFi
          </a>
          <a href="/embedded/wifi-status.html" class="block px-4 py-2 hover:bg-gray-100">
            WiFi Status
          </a>
        </div>
      </div>

      <!-- OTA Menu -->
      <div class="relative menu-group">
        <button class="px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700">
          OTA
        </button>

        <div class="absolute left-0 mt-0 hidden group-hover:block bg-white border border-gray-300 rounded shadow w-48 z-10">
          <a href="/embedded/ota.html" class="block px-4 py-2 hover:bg-gray-100">
            Firmware Update
          </a>
          <a href="/embedded/ota-fs.html" class="block px-4 py-2 hover:bg-gray-100">
            Filesystem Update
          </a>
        </div>
      </div>

      <!-- System Menu -->
      <div class="relative menu-group">
        <button class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">
          Device
        </button>

        <div class="absolute left-0 mt-0 hidden group-hover:block bg-white border border-gray-300 rounded shadow w-48 z-10">
          <a href="/embedded/control.html" class="block px-4 py-2 hover:bg-gray-100">
            Control
          </a>
          <a href="/embedded/info.html" class="block px-4 py-2 hover:bg-gray-100">
            Info
          </a>
        </div>
      </div>

    </div>

    <p class="text-sm text-gray-500 mt-6">
      This interface is embedded in firmware and always available.
    </p>

  </div>

<script>
  fetch('/embedded/navigation.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('navigation').innerHTML = html;
    });
</script>
</body>
</html>
