<!DOCTYPE html>
<html lang="en">
	<head>
	  <meta charset="UTF-8" />
	  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	  <title>ESP32 Runtime</title>

	  <link rel="stylesheet" href="/embedded/styles.css">

	</head>
	
<body class="bg-gray-100 text-gray-900 min-h-screen relative">

  <!-- Provisioning Card -->
  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <h1 class="text-2xl font-semibold mb-4">Runtime</h1>

	
	
	
    <!-- Navigation -->
    <nav class="emb-nav">
      <span class="emb-nav-title">ESP32 Runtime</span>
      <div class="emb-nav-actions">
        <a href="/" class="emb-nav-link">Home</a>
        <!-- Dev placeholder — reload the embedded UI; remove before production -->
        <a href="/embedded/index.html" class="emb-nav-link">Embedded</a>
        <div class="emb-nav-menu">
          <button id="emb-nav-btn" class="emb-nav-btn"
                  aria-haspopup="true" aria-expanded="false">
            Settings
          </button>
          <ul id="emb-nav-dropdown" class="emb-nav-dropdown hidden" role="menu">
            <li><a href="/embedded/index.html#wifi"     class="emb-nav-item" role="menuitem">Wi-Fi</a></li>
            <li><a href="/embedded/index.html#firmware" class="emb-nav-item" role="menuitem">Firmware</a></li>
            <li><a href="/embedded/index.html#device"   class="emb-nav-item" role="menuitem">Device</a></li>
            <li><a href="/embedded/index.html#security" class="emb-nav-item" role="menuitem">Security</a></li>
          </ul>
        </div>
      </div>
    </nav>

	<p class="text-gray-700 mb-6">
	  Users are expected to implement their own runtime application.
	  This embedded runtime index.html page is not expected to be seen in actual applications.
	</p>


  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const navBtn      = document.getElementById("emb-nav-btn");
      const navDropdown = document.getElementById("emb-nav-dropdown");
      if (!navBtn || !navDropdown) return;

      navBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = !navDropdown.classList.contains("hidden");
        navDropdown.classList.toggle("hidden", isOpen);
        navBtn.setAttribute("aria-expanded", String(!isOpen));
      });

      navDropdown.addEventListener("click", () => {
        navDropdown.classList.add("hidden");
        navBtn.setAttribute("aria-expanded", "false");
      });

      document.addEventListener("click", () => {
        navDropdown.classList.add("hidden");
        navBtn.setAttribute("aria-expanded", "false");
      });
    });
  </script>

</body>
</html>
